# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smartpizza}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080

# Azure OpenAI (matches @Value in AzureAIService.java)
azure.openai.api-key=${AZURE_OPENAI_KEY:your-key-here}
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:https://your-resource.openai.azure.com}

# Azure Maps (matches @Value in AzureMapsService.java)
azure.maps.key=${AZURE_MAPS_KEY:your-key-here}

# Razorpay (matches @Value in RazorpayService.java)
razorpay.key=${RAZORPAY_KEY:your-key-here}
razorpay.secret=${RAZORPAY_SECRET:your-secret-here}
